server:
  port: 80  # 💡 이게 있어야 주소창에서 숫자가 사라짐!! 했음~

spring:
  # 🏗️ 1. 데이터베이스(TiDB Cloud) 설정 했음~ [cite: 2026-02-19]
  datasource:
    url: jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/test?useSSL=true&verifyServerCertificate=true
    username: 2EBXp9bbFQWPD6t.root
    password: '${TIDB_PASSWORD}' 

    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # 📋 2. JPA & 하이버네이트 설정 했음~ [cite: 2026-02-19]
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # 📩 3. 이메일 인증 서버 설정 했음~ [cite: 2026-03-20]
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MY_MAIL_USER}
    password: ${MY_MAIL_PASS} 
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # 🎨 4. 화면 수정 바로 반영되게 캐시 껐음~ 했음!
  thymeleaf:
    cache: false

app:

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>짐 트래커 - 회원가입 💪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #000; 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            height: 100vh; 
            margin: 0; 
            padding-left: 10%; 
        }

        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; 
            object-fit: contain; 
            filter: brightness(0.6);
        }
        
        .signup-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px); 
            padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 100%; max-width: 400px; text-align: center; 
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .btn-primary { background-color: #007aff; border: none; font-weight: bold; padding: 12px; border-radius: 10px; }
        .btn-primary:hover { background-color: #005bb5; }
        
        input.form-control {
            border-radius: 10px !important; padding: 12px 15px !important; margin-bottom: 5px !important; /* 💡 간격 살짝 조정했음! */
            display: block; width: 100%;
        }

        .gym-input-wrapper {
            display: flex; align-items: center; border: 1px solid #ced4da;
            border-radius: 10px; background-color: #fff; margin-bottom: 5px; overflow: hidden; 
        }
        .gym-input-wrapper:focus-within {
            border-color: #86b7fe; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .gym-input-wrapper input {
            border: none !important; box-shadow: none !important; padding: 12px 15px;
            flex-grow: 1; width: 100%; outline: none; margin-bottom: 0 !important;
        }
        .gym-input-wrapper .eye-btn {
            width: 50px; display: flex; justify-content: center; align-items: center;
            color: #6c757d; cursor: pointer; background-color: transparent;
        }
        .gym-input-wrapper .eye-btn:hover { color: #007aff; }

        /* 💡 에러 메시지 스타일 추가했음~ */
        .error-msg {
            color: #dc3545; font-size: 0.8rem; text-align: left; margin-left: 5px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="/images/gym-bg.mp4" type="video/mp4">
    </video>

    <div class="signup-card">
        <h2 class="mb-4 text-primary fw-bold">🔥 Gym Tracker</h2>
        <p class="text-muted mb-4">6월 바프의 기적, 지금 시작하세요!</p>
        
        <form th:action="@{/signup}" th:object="${member}" method="post" onsubmit="return validatePassword()">
            
            <input type="text" th:field="*{username}" class="form-control" placeholder="사용할 아이디 입력">
            <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error-msg"></div>

            <input type="email" th:field="*{email}" class="form-control" placeholder="인증받을 이메일 주소">
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-msg"></div>

            <div class="gym-input-wrapper">
                <input type="password" id="password" th:field="*{password}" placeholder="비밀번호 입력">
                <div class="eye-btn" onclick="togglePassword('password', 'eyeIconPwd')">
                    <i class="bi bi-eye" id="eyeIconPwd"></i>
                </div>
            </div>
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-msg"></div>
            
            <div class="gym-input-wrapper">
                <input type="password" id="passwordConfirm" placeholder="비밀번호 한 번 더 확인!" required>
                <div class="eye-btn" onclick="togglePassword('passwordConfirm', 'eyeIconPwdConfirm')">
                    <i class="bi bi-eye" id="eyeIconPwdConfirm"></i>
                </div>
            </div>
            
            <input type="text" th:field="*{nickname}" class="form-control" placeholder="멋진 닉네임">
            <div th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}" class="error-msg"></div>
            
            <button type="submit" class="btn btn-primary w-100 mt-3">근성장 시작하기 🚀</button>
        </form>
        
        <div class="mt-4 small">
            이미 회원이신가요? <a th:href="@{/login}" class="text-decoration-none fw-bold">로그인하러 가기</a>
        </div>
    </div>

    <script>
        function validatePassword() {
            const pwd = document.getElementById('password').value;
            const pwdConfirm = document.getElementById('passwordConfirm').value;
            
            if(pwd !== pwdConfirm) {
                alert('비밀번호가 서로 다릅니다! 다시 확인해주세요! 🏋️‍♂️💦');
                document.getElementById('passwordConfirm').focus();
                return false; 
            }
            return true; 
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }
    </script>
</body>
</html>

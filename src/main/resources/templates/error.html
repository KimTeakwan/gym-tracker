<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>짐 트래커 - 길을 잃으셨나요?</title>
    <style>
        body { background: #121212; color: white; text-align: center; padding-top: 150px; font-family: sans-serif; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); display: inline-block; padding: 50px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        h1 { font-size: 3.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.8; }
        .btn { display: inline-block; margin-top: 30px; padding: 15px 30px; background: #007bff; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #0056b3; transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏋️‍♂️ 404 에러!!</h1>
        <p>어이 관장님!! 여기는 운동 기구가 없는 구역이야!! ㅋㅋㅋ</p>
        <p>찾으시는 주소가 우리 서버엔 없구먼!!</p>
        <a href="/" class="btn">다시 헬스장 정문으로 가기</a>
    </div>
</body>
</html>

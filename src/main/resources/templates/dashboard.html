<div class="card main-card p-4 mb-4">
    <h5 class="mb-3 text-primary fw-bold">🏋️‍♂️ 오늘의 오운완 기록하기</h5>
    <form action="/api/workouts/add" method="post" class="row g-2 align-items-center">
        <div class="col-md-3">
            <input type="text" name="name" class="form-control form-control-lg" placeholder="운동 종목 (ex: 벤치)" required>
        </div>
        
        <div class="col-md-2">
            <select name="category" class="form-select form-select-lg">
                <option value="가슴">가슴</option>
                <option value="등">등</option>
                <option value="하체">하체</option>
                <option value="어깨">어깨</option>
                <option value="팔">팔</option>
            </select>
        </div>

        <div class="col-md-2">
            <input type="number" name="weight" class="form-control form-control-lg" placeholder="무게(kg)" required>
        </div>

        <div class="col-md-2">
            <input type="number" name="reps" class="form-control form-control-lg" placeholder="횟수(회)" required>
        </div>

        <div class="col-md-2">
            <input type="number" name="sets" class="form-control form-control-lg" placeholder="세트(S)" required>
        </div>

        <div class="col-md-1">
            <button type="submit" class="btn btn-primary btn-lg w-100">🚀</button>
        </div>
    </form>
</div>

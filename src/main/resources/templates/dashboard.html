<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>바디프로필 가즈아! 💪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .main-card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #007aff; border: none; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <h2 class="text-center mb-5">🔥 6월 바디프로필 성공 기원 로그</h2>

        <div class="card main-card p-4 mb-4">
            <h5 class="mb-3 text-primary fw-bold">🏋️‍♂️ 오늘의 오운완 기록하기</h5>
            <form action="/api/workouts/add" method="post" class="row g-2 align-items-center">
                <div class="col-md-3">
                    <input type="text" name="name" class="form-control" placeholder="운동 종목" required>
                </div>
                <div class="col-md-2">
                    <select name="category" class="form-select">
                        <option value="가슴">가슴</option>
                        <option value="등">등</option>
                        <option value="하체">하체</option>
                        <option value="어깨">어깨</option>
                        <option value="팔">팔</option>
                    </select>
                </div>
                <div class="col-md-2"><input type="number" name="weight" class="form-control" placeholder="무게(kg)" required></div>
                <div class="col-md-2"><input type="number" name="reps" class="form-control" placeholder="횟수(회)" required></div>
                <div class="col-md-2"><input type="number" name="sets" class="form-control" placeholder="세트(S)" required></div>
                <div class="col-md-1"><button type="submit" class="btn btn-primary w-100">🚀</button></div>
            </form>
        </div>

        <div class="card main-card p-4">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr><th>부위</th><th>종목</th><th>상세</th><th>총 볼륨</th><th>날짜</th><th>관리</th></tr>
                </thead>
                <tbody>
                    <tr th:each="w : ${workouts}">
                        <td><span class="badge bg-info text-dark" th:text="${w.category}"></span></td>
                        <td class="fw-bold" th:text="${w.name}"></td>
                        <td th:text="${w.weight} + 'kg x ' + ${w.reps} + '회 x ' + ${w.sets} + '세트'"></td>
                        <td class="text-primary fw-bold" th:text="${w.totalVolume} + ' kg'"></td>
                        <td th:text="${#temporals.format(w.createdAt, 'MM/dd HH:mm')}"></td>
                        <td><a th:href="@{/api/workouts/delete/{id}(id=${w.id})}" class="btn btn-sm btn-outline-danger">삭제</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

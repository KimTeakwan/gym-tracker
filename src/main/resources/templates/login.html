<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>짐 트래커 - 로그인 💪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn-primary { background-color: #007aff; border: none; font-weight: bold; padding: 12px; border-radius: 10px; }
        .btn-primary:hover { background-color: #005bb5; }
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="mb-4 text-primary fw-bold">🔥 Gym Tracker</h2>
        <p class="text-muted mb-4">오늘도 득근하러 오셨군요!</p>
        
        <form action="/login" method="post">
            <input type="text" name="username" class="form-control" placeholder="아이디" required>
            <input type="password" name="password" class="form-control" placeholder="비밀번호" required>
            
            <button type="submit" class="btn btn-primary w-100 mt-3">로그인 🚀</button>
        </form>
        
        <div class="mt-4 small">
            아직 헬스장 회원이 아니신가요? <br>
            <a th:href="@{/signup}" class="text-decoration-none fw-bold text-danger">🔥 회원가입하고 6월 바프 준비하기</a>
        </div>
    </div>

</body>
</html>
